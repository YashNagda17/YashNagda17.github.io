---
layout: default
---

<article class="post">
  <p class="eyebrow">Blog post</p>
  <h1>{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%d %b %Y" }}</p>
  <div class="prose">
    {{ content }}
  </div>
</article>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="{{ '/assets/js/mermaid-init.js' | relative_url }}"></script>
